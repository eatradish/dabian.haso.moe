<!doctype html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>娱乐服务 - 奉天民国微短剧产业园官网</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Noto Serif CJK SC", "SimSun", "Georgia", serif;
      background-color: #f4ece1;
    }

    .all {
      width: 100%;
      overflow-x: hidden;
    }

    /* ======================================================== */
    /* 继承 index.html 的现代化标准导航栏样式 */
    /* ======================================================== */
    .nav {
      width: 100%;
      position: relative;
      top: 0;
      left: 0;
      z-index: 1000;
      background-color: #f3eae1;
    }

    .nav-top {
      width: 100%;
      max-width: 1920px;
      height: 157px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo-box {
      height: 100%;
      width: 480px;
      flex-shrink: 0;
    }

    .logo-box img {
      height: 100%;
      width: auto;
      display: block;
    }

    .slogan-box {
      text-align: center;
      color: #1B2437;
      flex-grow: 1;
    }

    .slogan-box h2 {
      font-size: 24px;
      letter-spacing: 4px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .slogan-box p {
      font-size: 14px;
      color: #6C6356;
      letter-spacing: 2px;
    }

    .phone-box {
      width: 300px;
      text-align: center;
      color: #1B2437;
      flex-shrink: 0;
      margin-right: 20px;
    }

    .phone-box .phone-icon {
      font-size: 28px;
      display: block;
      margin-bottom: 2px;
    }

    .phone-box .phone-number {
      font-size: 24px;
      font-weight: bold;
      letter-spacing: 1px;
      font-family: "Georgia", serif;
    }

    .nav-bar {
      width: 100%;
      border-top: 1px solid #D2C5B4;
      border-bottom: 1px solid #D2C5B4;
      background-color: #f3eae1;
    }

    .nav-bar ul {
      list-style: none;
      width: 100%;
      max-width: 1920px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(12, 1fr);
    }

    .nav-bar li {
      border-right: 1px solid #D2C5B4;
      text-align: center;
      height: 84px;
    }

    .nav-bar li:first-child {
      border-left: 1px solid #D2C5B4;
    }

    .nav-bar li.empty-cell {
      background-color: transparent;
    }

    .nav-bar a {
      display: block;
      width: 100%;
      height: 100%;
      line-height: 84px;
      text-decoration: none;
      color: #1B2437;
      font-size: 22px;
      font-weight: bold;
      transition: all 0.2s ease;
    }

    .nav-bar a:hover {
      color: antiquewhite;
      background-color: chocolate;
    }

    /* ======================================================== */
    /* 内容区与页脚样式优化 */
    /* ======================================================== */
    .main-container {
      width: 100%;
      max-width: 1920px;
      margin: 0 auto;
      position: relative;
    }

    .main-container img {
      display: block;
      width: 100%;
      height: auto; /* 保证大图等比例缩放，不会变形 */
    }

    .footer-container {
      width: 100%;
      max-width: 1920px;
      margin: 0 auto;
    }

    .footer-container img {
      display: block;
      width: 100%;
      height: auto;
    }
  </style>
</head>

<body>
  <div class="all">

    <!-- 1. 统一的头部导航栏（完全同步 index.html） -->
    <div class="nav">
      <div class="nav-top">
        <div class="logo-box"><img src="image/logo.png" alt="奉天民国短剧"></div>
        <div class="slogan-box">
          <h2>奉天民国微短剧产业园官网</h2>
          <p>为您提供系统化规划设计方案</p>
        </div>
        <div class="phone-box">
          <span class="phone-icon">☎</span>
          <span class="phone-number">0123-4567-7810</span>
        </div>
      </div>
      <div class="nav-bar">
        <ul>
          <li class="empty-cell"></li>
          <li class="empty-cell"></li>
          <li class="empty-cell"></li>
          <li><a href="index.html" target="_blank">网站首页</a></li>
          <li><a href="a.html" target="_blank">园区介绍</a></li>
          <li><a href="b.html" target="_blank">短剧服务</a></li>
          <li><a href="c.html" target="_blank">娱乐服务</a></li>
          <li><a href="d.html" target="_blank">加盟服务</a></li>
          <li><a href="d.html" target="_blank">合作伙伴</a></li>
          <li><a href="e.html" target="_blank">在线留言</a></li>
          <li><a href="e.html" target="_blank">联系我们</a></li>
          <li class="empty-cell"></li>
        </ul>
      </div>
    </div>

    <!-- 2. 娱乐服务核心内容区（自适应大图） -->
    <div class="main-container">
      <img src="image/娱乐服务.png" alt="娱乐服务内容"/>
      <!-- 如果后续需要给这张长图做点击热点，可以放心地在这里加 map 或者 absolute 的 a 标签 -->
      <map name="Map"></map>
    </div>

    <!-- 3. 页脚区（自适应大图） -->
    <div class="footer-container">
      <img src="image/页脚.png" alt="页脚"/>
    </div>

  </div>
</body>

</html>
